<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
</head>
<body>
    <h1>게시글 수정</h1>
    <form action="/post/edit" method="post">
        <!-- 식별자인 num을 hidden으로 전송 -->
        <input type="hidden" name="num" value="{{ post.num }}">
        
        <div>
            <label>작성자</label>
            <input type="text" name="writer" value="{{ post.writer }}">
        </div>
        <div>
            <label>제목</label>
            <input type="text" name="title" value="{{ post.title }}">
        </div>
        <div>
            <label>내용</label>
            <textarea name="content" rows="5">{{ post.content }}</textarea>
        </div>
        <button type="submit">수정 완료</button>
        <a href="/post">취소</a>
    </form>
</body>
</html>
